name = "otlp"
main = "src/index.ts"
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "OTEL_BUCKET"
bucket_name = "otel"

# Observability export (Dash0 via OTLP HTTP)
# -----------------------------------------------------------------------------
# Mirrors workers/core in lemma-platform. Destinations are account-scoped — share
# the same `dash-zero-prod-logs` / `dash-zero-prod-traces` destinations created
# for core (Cloudflare → Workers → Observability → Add destination). Dash0
# disambiguates senders via `cf.worker.name` resource attributes.
# Setup steps (one-time, only if destinations don't already exist):
# 1. In Dash0: Organization settings → copy your OTLP HTTP base URL.
# 2. In Cloudflare: Workers → Observability → Add destination, one per signal:
#      - Logs:   {BASE}/v1/logs   → name `dash-zero-prod-logs`
#      - Traces: {BASE}/v1/traces → name `dash-zero-prod-traces`
#    Custom headers on every destination:
#      - Authorization: Bearer auth_<your-dash0-token>
#      - Dash0-Dataset: prod   OR   dev
# 3. Until destinations exist in the dashboard, comment out the
#    `destinations = [...]` lines below or deploy will fail validation.
# -----------------------------------------------------------------------------
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
destinations = ["dash-zero-prod-logs"]

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
destinations = ["dash-zero-prod-traces"]

[limits]
cpu_ms = 5000
subrequests = 200

[vars]
OTEL_PAYLOAD_KEY_PREFIX = "otel:payload:v1"
OTEL_PAYLOAD_TTL_SECONDS = "3600"

[[services]]
binding = "CORE"
service = "core"

[[secrets_store_secrets]]
binding = "INFISICAL_CLIENT_ID"
store_id = "c4ce9025292146d0a6a1deaba55aa24e"
secret_name = "INFISICAL_CLIENT_ID"

[[secrets_store_secrets]]
binding = "INFISICAL_CLIENT_SECRET"
store_id = "c4ce9025292146d0a6a1deaba55aa24e"
secret_name = "INFISICAL_CLIENT_SECRET"

[[secrets_store_secrets]]
binding = "INFISICAL_ENVIRONMENT"
store_id = "c4ce9025292146d0a6a1deaba55aa24e"
secret_name = "INFISICAL_ENVIRONMENT"

[[secrets_store_secrets]]
binding = "INFISICAL_PROJECT_ID"
store_id = "c4ce9025292146d0a6a1deaba55aa24e"
secret_name = "INFISICAL_PROJECT_ID"

[[secrets_store_secrets]]
binding = "WORKER_SHARED_SECRET"
store_id = "c4ce9025292146d0a6a1deaba55aa24e"
secret_name = "WORKER_SHARED_SECRET"

[[queues.producers]]
binding = "OTEL_SPAN_INSERT_QUEUE"
queue = "otel-span-insert"

[[queues.producers]]
binding = "OTEL_SPAN_INSERT_DLQ"
queue = "otel-span-insert-dlq"

[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true
