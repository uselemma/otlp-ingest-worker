name = "otlp"
main = "src/index.ts"
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]

[limits]
cpu_ms = 5000
subrequests = 200

[[r2_buckets]]
binding = "OTEL_BUCKET"
# Keep local dev fully local so Wrangler service bindings can register this worker.
bucket_name = "otel"

[vars]
OTEL_PAYLOAD_KEY_PREFIX = "otel:payload:v1"
OTEL_PAYLOAD_TTL_SECONDS = "3600"
PROCESSOR_BUFFERED_REPARENT_DEBUG_PAYLOADS = "true"
PROCESSOR_BUFFERED_REPARENT_DEBUG_PAYLOAD_PREFIX = "debug/processor-buffered-reparent"

[[durable_objects.bindings]]
name = "TRACE_BUFFER"
class_name = "TraceBuffer"

[[migrations]]
tag = "v1-trace-buffer"
new_sqlite_classes = ["TraceBuffer"]

[[services]]
binding = "CORE"
service = "core"

[[queues.producers]]
binding = "OTEL_SPAN_INSERT_QUEUE"
queue = "otel-span-insert"

[[queues.producers]]
binding = "OTEL_SPAN_INSERT_DLQ"
queue = "otel-span-insert-dlq"

[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true
